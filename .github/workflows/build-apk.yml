name: Build Android APK EVOLIX
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 cmdline-tools;latest'

      - name: Install dependencies
        run: |
          npm install -g @ionic/cli
          npm install

      - name: Build Ionic App and Sync Android
        run: |
          ionic build --prod
          npx cap sync android

      - name: Generate Assets (Logo/Icon)
        run: npx capacitor-assets generate --android
        continue-on-error: true

      - name: Verify Android Project
        run: |
          echo "=== Gradle Version ==="
          cd android && ./gradlew --version
          echo "=== Installed SDK ==="
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --list | grep "platforms;android"

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EVOLIX-APK
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
