name: Build EVOLIX APK Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install Dependencies
        run: |
          npm install -g @ionic/cli @capacitor/cli @capacitor/android
          npm install
          npm install @capacitor/status-bar

      - name: Build Ionic App
        run: ionic build --prod

      - name: Add Android Platform
        run: |
          rm -rf android/
          npx cap add android
          npx cap sync android

      # 🔥 Mamorona icon sy splash screen avy amin'ny logo.png
      - name: Generate App Icons and Splash
        run: |
          # Mamorona folder resources
          mkdir -p resources
          
          # Jereo raha misy logo.png
          if [ -f "src/assets/logo.png" ]; then
            cp src/assets/logo.png resources/icon.png
            cp src/assets/logo.png resources/splash.png
            echo "✅ Logo hitako ao src/assets/logo.png"
          elif [ -f "src/assets/icon.png" ]; then
            cp src/assets/icon.png resources/icon.png
            cp src/assets/icon.png resources/splash.png
            echo "✅ Icon hitako ao src/assets/icon.png"
          else
            echo "⚠️ Tsy misy logo! Mamorona default icon..."
            # Mamorona default icon amin'ny alalan'ny convert (raha misy ImageMagick)
            # Raha tsy misy dia mampiasa base64 image
            echo "" | base64 -d > resources/icon.png
            cp resources/icon.png resources/splash.png
          fi
          
          # Mampiasa cordova-res hamoronana ny sary rehetra
          npm install -g cordova-res
          cordova-res android --skip-config --copy || echo "⚠️ cordova-res tsy nety, manao manual"
          
          # Raha cordova-res tsy nety, dia manao copy manual ny icon ho an'ny Android
          if [ ! -f "android/app/src/main/res/mipmap-hdpi/ic_launcher.png" ]; then
            echo "📱 Manao copy manual ny icon..."
            mkdir -p android/app/src/main/res/mipmap-hdpi
            mkdir -p android/app/src/main/res/mipmap-mdpi
            mkdir -p android/app/src/main/res/mipmap-xhdpi
            mkdir -p android/app/src/main/res/mipmap-xxhdpi
            mkdir -p android/app/src/main/res/mipmap-xxxhdpi
            
            # Raha misy ImageMagick dia resize, raha tsy misy dia copy fotsiny
            if command -v convert &> /dev/null; then
              convert resources/icon.png -resize 72x72 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
              convert resources/icon.png -resize 48x48 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
              convert resources/icon.png -resize 96x96 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
              convert resources/icon.png -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
              convert resources/icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
              echo "✅ Icon noforonina tamin'ny ImageMagick"
            else
              cp resources/icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
              cp resources/icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
              cp resources/icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
              cp resources/icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
              cp resources/icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
              echo "✅ Icon nokopia (tsara fa misy sady)"
            fi
          fi
        continue-on-error: true

      # 🔥 Manova ny app name ho EVOLIX
      - name: Set App Name to EVOLIX
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">EVOLIX<\/string>/g' android/app/src/main/res/values/strings.xml
          echo "✅ App name novaina ho EVOLIX"

      # 🔥 Manova ny anaran'ny APK ao amin'ny build.gradle
      - name: Set APK Name in build.gradle
        run: |
          sed -i '/archivesBaseName/d' android/app/build.gradle
          sed -i '/defaultConfig {/a \        archivesBaseName = "EVOLIX"' android/app/build.gradle
          echo "✅ APK name set to EVOLIX"

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      # 🔥 Jereo raha misy ilay APK
      - name: Check APK files
        run: |
          echo "📁 Contenu du dossier APK:"
          ls -la android/app/build/outputs/apk/debug/ || echo "❌ Dossier tsy misy"
          echo ""
          echo "📁 Recherche de tous les APK:"
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "❌ Tsy misy APK hita"

      # 🔥 Manova anarana ny APK vokatra
      - name: Rename APK to EVOLIX.apk
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/EVOLIX.apk
            echo "✅ Renamed app-debug.apk -> EVOLIX.apk"
          elif [ -f "android/app/build/outputs/apk/debug/EVOLIX-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/EVOLIX-debug.apk android/app/build/outputs/apk/debug/EVOLIX.apk
            echo "✅ Renamed EVOLIX-debug.apk -> EVOLIX.apk"
          elif [ -f "android/app/build/outputs/apk/debug/EVOLIX.apk" ]; then
            echo "✅ EVOLIX.apk efa misy!"
          else
            echo "❌ Tsy misy APK hita!"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null
            exit 1
          fi
        shell: bash

      # 🔥 Upload ny APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EVOLIX-APK
          path: android/app/build/outputs/apk/debug/Evolix.apk
          if-no-files-found: error