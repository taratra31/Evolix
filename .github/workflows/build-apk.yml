name: Build EVOLIX APK Final
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: |
          npm install -g @ionic/cli @capacitor/cli @capacitor/android
          npm install

      - name: Build Ionic App
        run: ionic build --prod

      - name: Add Android Platform
        run: |
          rm -rf android/
          npx cap add android
          npx cap sync android

      # 🔥 Mamorona icon avy amin'ny assets/logo.png
      - name: Generate App Icons
        run: |
          mkdir -p resources
          if [ -f "src/assets/logo.png" ]; then
            cp src/assets/logo.png resources/icon.png
            echo "✅ Logo hitako, adika any resources/icon.png"
          else
            echo "⚠️ Tsy misy logo.png ao amin'ny src/assets/"
          fi
          npm install -g cordova-res
          cordova-res android --skip-config --copy --icon-source resources/icon.png 2>/dev/null || echo "Nampiasa default icon"
        continue-on-error: true

      # 🔥 Manova ny app name ho EVOLIX
      - name: Set App Name to EVOLIX
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">EVOLIX<\/string>/g' android/app/src/main/res/values/strings.xml
          echo "✅ App name novaina ho EVOLIX"

      # 🔥 Manova ny anaran'ny APK ao amin'ny build.gradle
      - name: Set APK Name in build.gradle
        run: |
          # Esory ny archivesBaseName efa misy raha misy
          sed -i '/archivesBaseName/d' android/app/build.gradle
          # Ampio ny vaovao
          sed -i '/defaultConfig {/a \        archivesBaseName = "EVOLIX"' android/app/build.gradle
          echo "✅ APK name set to EVOLIX"

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      # 🔥 Jereo raha misy ilay APK
      - name: Check APK files
        run: |
          echo "📁 Contenu du dossier APK:"
          ls -la android/app/build/outputs/apk/debug/ || echo "❌ Dossier tsy misy"
          echo ""
          echo "📁 Recherche de tous les APK:"
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "❌ Tsy misy APK hita"

      # 🔥 Manova anarana ny APK vokatra
      - name: Rename APK to EVOLIX.apk
        run: |
          # Jereo raha misy ilay fichier debug
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/EVOLIX.apk
            echo "✅ Renamed app-debug.apk -> EVOLIX.apk"
          
          # Raha EVOLIX mivantana ilay anarana (noho ny archivesBaseName)
          elif [ -f "android/app/build/outputs/apk/debug/EVOLIX-debug.apk" ]; then
            mv android/app/build/outputs/apk/debug/EVOLIX-debug.apk android/app/build/outputs/apk/debug/EVOLIX.apk
            echo "✅ Renamed EVOLIX-debug.apk -> EVOLIX.apk"
          
          # Raha release no natao
          elif [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            mkdir -p android/app/build/outputs/apk/debug/
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/debug/EVOLIX.apk
            echo "✅ Copied release APK -> EVOLIX.apk"
          
          else
            echo "❌ Tsy misy APK hita! Izao no ao anaty dossier:"
            find android/app/build/outputs -type f -name "*.apk" 2>/dev/null
            echo ""
            echo "Mila amboarina ny build!"
            exit 1
          fi
        shell: bash

      # 🔥 Upload ny APK (mampiasa wildcard mba tsy ho diso)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: EVOLIX-APK
          path: android/app/build/outputs/apk/debug/EVOLIX.apk
          if-no-files-found: warn
