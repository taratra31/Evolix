name: Build Android APK EVOLIX
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm install -g @ionic/cli
          npm install

      - name: Build Ionic App and Sync Android
        run: |
          ionic build --prod
          npx cap sync android

      - name: Generate Assets (Logo/Icon)
        run: npx capacitor-assets generate --android
        continue-on-error: true  # Raha tsy misy dossier 'resources' dia tsy hijanona ny build

      - name: Build APK with Stacktrace
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m -XX:+HeapDumpOnOutOfMemoryError"
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: List APK files (Debug)
        run: |
          echo "Mitady APK ao amin'ny:"
          find android/app/build/outputs -name "*.apk" 2>/dev/null || echo "Tsy nahita APK"

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: EVOLIX-APK
          path: android/app/build/outputs/apk/**/*.apk  # Mitady APK na aiza na aiza ao anaty
          if-no-files-found: error  # Hanao erreur raha tsy misy APK
